<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DinoJam</title>
  <link rel="stylesheet" href="style.css">

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body class="customization-hidden">

  <!-- Loading overlay -->
  <div id="loading">
    <p class="loader-text">Cargando T-Rex</p>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>

  <!-- Three.js canvas va aquí -->
  <div id="canvas-container"></div>

  <!-- Debug / animation panel -->
  <div id="debug">
    <h3>Animaciones</h3>
    <div id="btn-container"></div>
  </div>

  <!-- Audio controls -->
  <div id="audio-controls">
    <button id="bgm-toggle" class="anim-btn">
      <span class="dot"></span>BGM
    </button>
  </div>

  <div id="brand-controls">
    <div id="brand-meta">
      <div id="app-title">DinoJam</div>
      <div id="status">estado: <span id="status-text">iniciando...</span></div>
    </div>
    <button id="customization-toggle" class="anim-btn" aria-label="Personalizacion" title="Personalizacion">&#9881;</button>
  </div>

  <div id="start-overlay" class="hidden" role="dialog" aria-live="polite" aria-label="Iniciar experiencia">
    <p>Audio listo. Haz clic para iniciar la experiencia.</p>
    <button id="start-experience-btn" class="anim-btn active">Iniciar experiencia</button>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
